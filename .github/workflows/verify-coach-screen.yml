name: Verify Coach Screen

on:
  push:
    paths:
      - 'src/screens/CoachScreen.tsx'
      - 'Build_plan.md'

jobs:
  verify:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22.22.1
      - name: Install dependencies
        run: npm ci
      - name: Run TypeScript compiler
        run: npx tsc --noEmit
