name: Expo Doctor

on:
  push:
    paths:
      - 'package.json'
      - 'package-lock.json'
      - 'app.json'
  pull_request:
    paths:
      - 'package.json'
      - 'package-lock.json'
      - 'app.json'

jobs:
  doctor:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Run Expo Doctor
        run: npx expo-doctor@latest
        continue-on-error: true
